services:
  db:
    image: postgres:15-alpine
    container_name: bookkeeping_db
    restart: always
    environment:
      POSTGRES_DB: bookkeeping
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-production_secure_db_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bookkeeping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bookkeeping_net

  redis:
    image: redis:7-alpine
    container_name: bookkeeping_redis
    restart: always
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bookkeeping_net

  backend:
    build: ./backend
    container_name: bookkeeping_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-production_secure_db_pass}@db:5432/bookkeeping
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY
      - SECRET_KEY
      - ALLOWED_ORIGINS=https://apexbooks.in,https://api.apexbooks.in
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@apexbooks.in}
      - IRP_BASE_URL=${IRP_BASE_URL:-https://einvoice1-sandbox.nic.in}
      - IRP_CLIENT_ID=${IRP_CLIENT_ID:-}
      - IRP_CLIENT_SECRET=${IRP_CLIENT_SECRET:-}
      - IRP_USERNAME=${IRP_USERNAME:-}
      - IRP_PASSWORD=${IRP_PASSWORD:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - S3_BUCKET=${S3_BUCKET:-bookkeeping-documents}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bookkeeping_net

  worker:
    build: ./backend
    container_name: bookkeeping_worker
    command: celery -A src.workers.tasks.celery_app worker --loglevel=info
    restart: always
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-production_secure_db_pass}@db:5432/bookkeeping
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY
      - SECRET_KEY
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bookkeeping_net

  frontend:
    build: ./frontend
    container_name: bookkeeping_frontend
    restart: always
    ports:
      - "8080:80"
    networks:
      - bookkeeping_net

networks:
  bookkeeping_net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
